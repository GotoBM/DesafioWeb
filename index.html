<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria pokemon</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<!-- Modal de detalles -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-cerrar">✖</button>
    <div id="modal-contenido"></div>
  </div>
</div>
<body>

    <header>
        <h1>Galeria pokemon</h1>
        <!--<label for="buscar">Buscar</label>-->
        <input type="text" id="buscar" placeholder="Buscar pokemon...">
        <button id="cargar">Cargar Pokemon</button>
        <button id="toggle-tema">🌙 Modo claro</button>
        <button id="btn-ver-favoritos">❤️ Ver favoritos</button>
        <!-- Menú de regiones -->
        <div class="menu-regiones">
            <button id="btn-regiones">🌍 Regiones ▾</button>
            <ul id="lista-regiones">
                <li data-offset="0"   data-limit="151">🔴 Kanto (Gen 1)</li>
                <li data-offset="151" data-limit="100">⚪ Johto (Gen 2)</li>
                <li data-offset="251" data-limit="135">🟢 Hoenn (Gen 3)</li>
                <li data-offset="386" data-limit="107">🔵 Sinnoh (Gen 4)</li>
                <li data-offset="493" data-limit="156">⚫ Unova (Gen 5)</li>
                <li data-offset="649" data-limit="72">🔵 Kalos (Gen 6)</li>
                <li data-offset="721" data-limit="88">🟡 Alola (Gen 7)</li>
                <li data-offset="809" data-limit="96">🟣 Galar (Gen 8)</li>
                <li data-offset="905" data-limit="120">🟠 Paldea (Gen 9)</li>
            </ul>
        </div>
        <button id="btn-toggle-resena">📝 Dejar reseña</button>
    </header>

    <main>
        <section id="galeria">
            <h2 class="sr-only">Resultados</h2>
        </section>
        <button id="cargar-mas" style="display:none">Cargar más</button>

        <!-- Segundo endpoint: POST (oculto por defecto) -->
        <section id="seccion-post" style="display:none">
            <h2>Deja una reseña</h2>
            <div class="form-post">
                <label for="post-titulo">Título</label>
                <input type="text" id="post-titulo" placeholder="ej: Me encantó Pikachu">

                <label for="post-cuerpo">Comentario</label>
                <input type="text" id="post-cuerpo" placeholder="Escribe tu comentario...">

                <button id="btn-enviar">📨 Enviar reseña</button>
                <p id="post-respuesta" aria-live="polite"></p>
            </div>
        </section>
    </main>

    <footer>
         <!-- <p>Datos de <a href="https://pokeapi.co" target="_blank" rel="noopener">PokéAPI</a></p> -->
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
